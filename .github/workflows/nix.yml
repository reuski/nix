name: nix

on:
  pull_request:
    paths:
      - "**/*.nix"
      - "flake.lock"
      - "flake.nix"
      - "install.sh"
      - ".github/workflows/**"
      - ".github/actions/**"
  push:
    branches: [main]
    paths:
      - "**/*.nix"
      - "flake.lock"
      - "flake.nix"
      - "install.sh"
      - ".github/workflows/**"
      - ".github/actions/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

env:
  NIX_CONFIG: |
    experimental-features = nix-command flakes
    accept-flake-config = true
    download-buffer-size = 536870912

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.head_ref || github.ref }}

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - uses: DeterminateSystems/magic-nix-cache-action@6221693898146dc97e38ad0e013488a16477a4c4 # v9

      - uses: ./.github/actions/validate

      - if: github.event_name == 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add -A
            git commit -m "style: auto-format"
            git push
          fi

      - id: pr
        if: github.event_name == 'push'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          commit-message: "chore: apply formatting and lockfile sync"
          title: "chore: apply formatting and lockfile sync"
          body: "Automated fixes."
          branch: chore/auto-fix
          delete-branch: true

      - if: github.event_name == 'push' && steps.pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.pr.outputs.pull-request-number }}"
          if [ "$(gh pr view "$PR" --json autoMergeRequest --jq '.autoMergeRequest != null')" = "false" ]; then
            gh pr merge --auto --squash --delete-branch "$PR"
          fi
