name: flake-lock

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

env:
  NIX_CONFIG: |
    experimental-features = nix-command flakes
    accept-flake-config = true
    download-buffer-size = 536870912

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - run: nix flake update
      - uses: ./.github/actions/validate

      - id: pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.FLAKE_LOCK_TOKEN || github.token }}
          commit-message: "chore: flake.lock update"
          title: "chore: flake.lock update"
          body: "Automated flake input refresh."
          branch: chore/flake-lock
          delete-branch: true
          labels: automated, flake-lock
          add-paths: flake.lock

      - if: steps.pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.FLAKE_LOCK_TOKEN || github.token }}
        run: |
          PR="${{ steps.pr.outputs.pull-request-number }}"
          if [ "$(gh pr view "$PR" --json autoMergeRequest --jq '.autoMergeRequest != null')" = "false" ]; then
            gh pr merge --auto --squash --delete-branch "$PR"
          fi
